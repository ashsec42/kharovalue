name: True Value Monitor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [auto_trigger_radar]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 340 # Safe cutoff at 5.5 hours to refresh the container

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run the bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      # Endless loop handover mechanism
      # Fires a repository dispatch payload back to this exact file to spawn the next runner cleanly
       Kak-Link Next Continuous Run
      - name: Chain-Link Next Continuous Run
        if: always()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "auto_trigger_radar"}'
